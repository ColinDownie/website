<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ross Face – Light</title>
  <link rel="stylesheet" href="faces.css">
</head>
<body class="face-body face-light">

<div class="face-wrapper">
  <div class="face-rim face-rim-light"></div>
  <div class="face-core face-core-light">
    <img src="../global/ross-crest.svg" class="face-crest" alt="Ross Crest">
  <div class="dial-grid">
  <div class="dial dial-prod"></div>
  <div class="dial dial-pipe"></div>
  <div class="dial dial-vis"></div>
  <div class="dial dial-anim"></div>
  <div class="dial dial-std"></div>
  <div class="dial dial-tools"></div>
</div>
<div class="dial-links">
      <a class="dial-link link-prod"></a>
      <a class="dial-link link-pipe"></a>
      <a class="dial-link link-vis"></a>
      <a class="dial-link link-anim"></a>
      <a class="dial-link link-std"></a>
      <a class="dial-link link-tools"></a>
    </div>

  </div>

</div>
</body>
</html>
