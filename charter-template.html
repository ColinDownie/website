<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ross House — Document Template</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="backoffice-page">

  <div class="backoffice-crest">
    <img src="../assets/images/crest-backoffice.png" alt="Back Office Crest">
  </div>

  <h1>Ross House Document</h1>

  <div class="backoffice-panel">

    <h2>Title</h2>
    <p>[Insert document title here]</p>

    <h2>Purpose</h2>
    <p>[State the purpose of this document]</p>

    <h2>Content</h2>
    <p>[Main body text goes here]</p>

    <h2>Signatures</h2>
    <p>Signed by: ___________________________</p>

  </div>

</body>
</html>
